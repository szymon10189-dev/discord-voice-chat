{% extends "base.html" %}
{% block title %}Edycja profilu — discord_clone{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">
    <div class="card card-discord">
      <div class="card-header py-3">Twój profil</div>
      <div class="card-body p-4">
        {% if user.avatar %}
          <div class="text-center mb-4">
            <img src="{{ user.avatar.url }}" alt="Avatar" class="rounded-circle border border-secondary"
                 style="width: 96px; height: 96px; object-fit: cover;">
          </div>
        {% endif %}
        <form method="post" enctype="multipart/form-data" action="" novalidate>
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}
                <div class="invalid-feedback d-block">{{ field.errors|striptags }}</div>
              {% endif %}
            </div>
          {% endfor %}
          <button type="submit" class="btn btn-discord-primary w-100 py-2">Zapisz zmiany</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
