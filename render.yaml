# Lekki blueprint: tylko Web Service + SQLite (bez PostgreSQL, bez Redis).
services:
  - type: web
    name: discord-clone
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: bash scripts/start_daphne.sh
    envVars:
      - key: DEBUG
        value: "False"
      - key: SERVE_MEDIA
        value: "True"
      - key: SECRET_KEY
        generateValue: true
